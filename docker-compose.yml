services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pet_ai
      POSTGRES_PASSWORD: pet_ai_password
      POSTGRES_DB: pet_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

